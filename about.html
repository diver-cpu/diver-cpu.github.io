<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOUT - 霓虹风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .navbar {
            display: flex;
            gap: 0;
            background: rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 1;
            border-bottom: 2px solid #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .nav-item {
            position: relative;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
            flex: 1;
            text-align: center;
            text-decoration: none;
        }

        .nav-item:nth-child(1) {
            color: #00ffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff;
            background: rgba(0, 255, 255, 0.05);
        }

        .nav-item:nth-child(2) {
            color: #ff00ff;
            text-shadow: 
                0 0 10px #ff00ff,
                0 0 20px #ff00ff,
                0 0 30px #ff00ff;
            background: rgba(255, 0, 255, 0.15);
        }

        .nav-item:nth-child(3) {
            color: #ffff00;
            text-shadow: 
                0 0 10px #ffff00,
                0 0 20px #ffff00,
                0 0 30px #ffff00;
            background: rgba(255, 255, 0, 0.05);
        }

        .nav-item:nth-child(4) {
            color: #ff6b6b;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b;
            background: rgba(255, 107, 107, 0.05);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 100px;
            font-weight: bold;
            text-transform: uppercase;
            color: #ff00ff;
            text-shadow: 
                0 0 10px #ff00ff,
                0 0 20px #ff00ff,
                0 0 40px #ff00ff,
                0 0 80px #ff00ff,
                0 0 120px #ff00ff;
            letter-spacing: 15px;
            margin-bottom: 20px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% {
                text-shadow: 
                    0 0 10px #ff00ff,
                    0 0 20px #ff00ff,
                    0 0 40px #ff00ff,
                    0 0 80px #ff00ff;
            }
            100% {
                text-shadow: 
                    0 0 15px #ff00ff,
                    0 0 30px #ff00ff,
                    0 0 60px #ff00ff,
                    0 0 120px #ff00ff,
                    0 0 160px #ff00ff;
            }
        }

        .gradient-bar {
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            margin-bottom: 40px;
            border-radius: 2px;
            box-shadow: 
                0 0 10px #00ffff,
                0 0 20px #ff00ff;
        }

        .about-text {
            font-size: 20px;
            line-height: 1.8;
            color: #ccc;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 50px;
        }

        .stat-card {
            background: rgba(255, 0, 255, 0.05);
            border: 1px solid #ff00ff;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3);
        }

        .stat-number {
            font-size: 48px;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #aaa;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .background-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 0, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 2;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    
    <div class="navbar">
        <a href="home.html" class="nav-item">MY-HOME</a>
        <a href="about.html" class="nav-item">MY-ABOUT</a>
        <a href="blog.html" class="nav-item">MY-BLOG</a>
        <a href="staff.html" class="nav-item">MY-STAFF</a>
    </div>

    <div class="content">
        <h1 class="title">ABOUT US</h1>
        <div class="gradient-bar"></div>
        <p class="about-text">
            我们是一群热爱科技与艺术的创作者，致力于在数字世界中打造独特的视觉体验。通过霓虹美学，我们希望为每一位访客带来未来主义的沉浸感。
        </p>
        <p class="about-text">
            成立于2018年，我们的团队专注于创新设计和前沿技术的融合。从概念到实现，每一个细节都经过精心打磨。
        </p>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number">50+</div>
                <div class="stat-label">项目完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">200+</div>
                <div class="stat-label">文章发布</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">10K+</div>
                <div class="stat-label">活跃用户</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">5</div>
                <div class="stat-label">年经验</div>
            </div>
        </div>
    </div>
</body>
</html>
