<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME - 霓虹风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .navbar {
            display: flex;
            gap: 0;
            background: rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 1;
            border-bottom: 2px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .nav-item {
            position: relative;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
            flex: 1;
            text-align: center;
            text-decoration: none;
        }

        .nav-item:nth-child(1) {
            color: #00ffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff;
            background: rgba(0, 255, 255, 0.15);
        }

        .nav-item:nth-child(2) {
            color: #ff00ff;
            text-shadow: 
                0 0 10px #ff00ff,
                0 0 20px #ff00ff,
                0 0 30px #ff00ff;
            background: rgba(255, 0, 255, 0.05);
        }

        .nav-item:nth-child(3) {
            color: #ffff00;
            text-shadow: 
                0 0 10px #ffff00,
                0 0 20px #ffff00,
                0 0 30px #ffff00;
            background: rgba(255, 255, 0, 0.05);
        }

        .nav-item:nth-child(4) {
            color: #ff6b6b;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b;
            background: rgba(255, 107, 107, 0.05);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 100px;
            font-weight: bold;
            text-transform: uppercase;
            color: #00ffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff,
                0 0 80px #00ffff,
                0 0 120px #00ffff;
            letter-spacing: 15px;
            margin-bottom: 20px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 40px #00ffff,
                    0 0 80px #00ffff;
            }
            100% {
                text-shadow: 
                    0 0 15px #00ffff,
                    0 0 30px #00ffff,
                    0 0 60px #00ffff,
                    0 0 120px #00ffff,
                    0 0 160px #00ffff;
            }
        }

        .gradient-bar {
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            margin-bottom: 40px;
            border-radius: 2px;
            box-shadow: 
                0 0 10px #ff00ff,
                0 0 20px #00ffff;
        }

        .welcome-text {
            font-size: 24px;
            line-height: 1.8;
            color: #ccc;
            margin-bottom: 30px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 50px;
        }

        .feature-card {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid #00ffff;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .feature-card h3 {
            color: #00ffff;
            font-size: 24px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #00ffff;
        }

        .feature-card p {
            color: #aaa;
            font-size: 16px;
        }

        .background-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 2;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    
    <div class="navbar">
        <a href="home.html" class="nav-item">MY-HOME</a>
        <a href="about.html" class="nav-item">MY-ABOUT</a>
        <a href="blog.html" class="nav-item">MY-BLOG</a>
        <a href="staff.html" class="nav-item">MY-STAFF</a>
    </div>

    <div class="content">
        <h1 class="title">WELCOME</h1>
        <div class="gradient-bar"></div>
        <p class="welcome-text">
            欢迎来到霓虹世界！这里是一个充满未来科技感的数字空间。探索我们的内容，感受独特的视觉体验。
        </p>
        <div class="feature-grid">
            <div class="feature-card">
                <h3>最新文章</h3>
                <p>探索我们精心策划的博客内容</p>
            </div>
            <div class="feature-card">
                <h3>关于我们</h3>
                <p>了解我们的故事和愿景</p>
            </div>
            <div class="feature-card">
                <h3>团队成员</h3>
                <p>认识我们才华横溢的团队</p>
            </div>
        </div>
    </div>
</body>
</html>
