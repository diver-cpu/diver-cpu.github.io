<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAFF - 霓虹风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .navbar {
            display: flex;
            gap: 0;
            background: rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 1;
            border-bottom: 2px solid #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }

        .nav-item {
            position: relative;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
            flex: 1;
            text-align: center;
            text-decoration: none;
        }

        .nav-item:nth-child(1) {
            color: #00ffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff;
            background: rgba(0, 255, 255, 0.05);
        }

        .nav-item:nth-child(2) {
            color: #ff00ff;
            text-shadow: 
                0 0 10px #ff00ff,
                0 0 20px #ff00ff,
                0 0 30px #ff00ff;
            background: rgba(255, 0, 255, 0.05);
        }

        .nav-item:nth-child(3) {
            color: #ffff00;
            text-shadow: 
                0 0 10px #ffff00,
                0 0 20px #ffff00,
                0 0 30px #ffff00;
            background: rgba(255, 255, 0, 0.05);
        }

        .nav-item:nth-child(4) {
            color: #ff6b6b;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b;
            background: rgba(255, 107, 107, 0.15);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 15px rgba(255, 107, 107, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
            }
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 120px;
            font-weight: bold;
            text-transform: uppercase;
            color: #00ffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff,
                0 0 80px #00ffff,
                0 0 120px #00ffff;
            letter-spacing: 15px;
            margin-bottom: 20px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 40px #00ffff,
                    0 0 80px #00ffff;
            }
            100% {
                text-shadow: 
                    0 0 15px #00ffff,
                    0 0 30px #00ffff,
                    0 0 60px #00ffff,
                    0 0 120px #00ffff,
                    0 0 160px #00ffff;
            }
        }

        .gradient-bar {
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            margin-bottom: 40px;
            border-radius: 2px;
            box-shadow: 
                0 0 10px #ff00ff,
                0 0 20px #00ffff;
        }

        .subtitle {
            font-size: 48px;
            font-weight: bold;
            text-transform: uppercase;
            color: #00ffff;
            text-shadow: 
                0 0 8px #00ffff,
                0 0 15px #00ffff,
                0 0 25px #00ffff;
            letter-spacing: 8px;
            margin-bottom: 30px;
        }

        .subtitle::before {
            content: '• ';
        }

        .position {
            font-size: 36px;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffff00;
            text-shadow: 
                0 0 8px #ffff00,
                0 0 15px #ffff00,
                0 0 25px #ffff00;
            letter-spacing: 6px;
            margin-bottom: 60px;
        }

        .staff-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin-top: 50px;
        }

        .staff-card {
            background: rgba(255, 107, 107, 0.05);
            border: 1px solid #ff6b6b;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .staff-card:hover {
            background: rgba(255, 107, 107, 0.1);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
        }

        .staff-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff6b6b, #ff00ff);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .staff-name {
            font-size: 24px;
            color: #ff6b6b;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ff6b6b;
        }

        .staff-role {
            font-size: 16px;
            color: #aaa;
        }

        .background-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 107, 107, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 107, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 2;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    
    <div class="navbar">
        <a href="home.html" class="nav-item">MY-HOME</a>
        <a href="about.html" class="nav-item">MY-ABOUT</a>
        <a href="blog.html" class="nav-item">MY-BLOG</a>
        <a href="staff.html" class="nav-item">MY-STAFF</a>
    </div>

    <div class="content">
        <h1 class="title">STAFF</h1>
        <div class="gradient-bar"></div>
        <h2 class="subtitle">JILL SMITH</h2>
        <div class="position">CHIEF EDITOR</div>
        
        <div class="staff-grid">
            <div class="staff-card">
                <div class="staff-avatar">J</div>
                <h3 class="staff-name">Jill Smith</h3>
                <p class="staff-role">Chief Editor</p>
            </div>
            <div class="staff-card">
                <div class="staff-avatar">T</div>
                <h3 class="staff-name">Ted Doe</h3>
                <p class="staff-role">Writer</p>
            </div>
            <div class="staff-card">
                <div class="staff-avatar">A</div>
                <h3 class="staff-name">Alex Chen</h3>
                <p class="staff-role">Designer</p>
            </div>
            <div class="staff-card">
                <div class="staff-avatar">M</div>
                <h3 class="staff-name">Maria Garcia</h3>
                <p class="staff-role">Developer</p>
            </div>
        </div>
    </div>
</body>
</html>
