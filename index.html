<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diver CPU - Personal Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .navbar {
            display: flex;
            justify-content: flex-end;
            padding: 20px 60px;
            background: rgba(0, 0, 0, 0.8);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }

        .nav-item {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .nav-item:hover {
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
        }

        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-top: 80px;
            position: relative;
        }

        .hero-content {
            text-align: center;
            z-index: 1;
        }

        .greeting {
            font-size: 24px;
            color: #00ffff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
            margin-bottom: 20px;
            letter-spacing: 8px;
            animation: fadeIn 2s ease-out;
        }

        .name {
            font-size: 80px;
            font-weight: bold;
            color: #fff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff,
                0 0 80px #00ffff;
            letter-spacing: 20px;
            margin-bottom: 30px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        .subtitle {
            font-size: 28px;
            color: #ff00ff;
            text-shadow: 0 0 15px rgba(255, 0, 255, 0.6);
            letter-spacing: 5px;
            margin-bottom: 40px;
        }

        .description {
            font-size: 18px;
            color: #888;
            max-width: 600px;
            line-height: 1.8;
            margin-bottom: 60px;
        }

        .social-links {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ffff;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .social-link:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            transform: translateY(-5px);
        }

        @keyframes titleGlow {
            0% {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 40px #00ffff;
            }
            100% {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 40px #00ffff,
                    0 0 80px #00ffff,
                    0 0 120px #00ffff;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .background-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 2;
        }

        .cursor {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .scroll-indicator {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-20px); }
            60% { transform: translateX(-50%) translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="scanlines"></div>
    
    <div class="navbar">
        <a href="#about" class="nav-item">About</a>
        <a href="#blog" class="nav-item">Blog</a>
        <a href="#projects" class="nav-item">Projects</a>
        <a href="#contact" class="nav-item">Contact</a>
    </div>

    <div class="hero">
        <div class="hero-content">
            <div class="greeting">HELLO, WORLD.</div>
            <h1 class="name">DIVER CPU</h1>
            <div class="subtitle">SOFTWARE ENGINEER <span class="cursor">_</span></div>
            <p class="description">
                Passionate about creating innovative solutions and exploring new technologies.
                Building digital experiences that inspire and empower.
            </p>
            <div class="social-links">
                <a href="https://github.com/diver-cpu" target="_blank" class="social-link">G</a>
                <a href="https://twitter.com" target="_blank" class="social-link">T</a>
                <a href="mailto:hello@divercpu.dev" class="social-link">M</a>
            </div>
        </div>
        <div class="scroll-indicator">
            <div style="width: 30px; height: 50px; border: 2px solid #00ffff; border-radius: 25px; display: flex; justify-content: center; padding-top: 10px;">
                <div style="width: 6px; height: 15px; background: #00ffff; border-radius: 3px; animation: scrollDown 2s infinite;"></div>
            </div>
        </div>
    </div>

    <style>
        @keyframes scrollDown {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(20px); opacity: 0; }
        }
    </style>
</body>
</html>
